services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-learning_english}
      POSTGRES_USER: ${POSTGRES_USER:-learning_english}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-learning_english_dev}
      POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS:---encoding=UTF8}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-learning_english} -d ${POSTGRES_DB:-learning_english}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  migrate:
    image: migrate/migrate:v4.19.1
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      [
        "migrate",
        "-path=/migrations",
        "-database",
        "${DATABASE_URL_INTERNAL:-postgres://learning_english:learning_english_dev@postgres:5432/learning_english?sslmode=disable}",
      ]
    volumes:
      - ./backend/migrations:/migrations

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app
    command:
      [
        "go",
        "run",
        "./cmd/api",
      ]
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://localhost:5173}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8080}
      API_ADDR: ${API_ADDR:-:8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      REQUEST_ID_HEADER: ${REQUEST_ID_HEADER:-X-Request-Id}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      DATABASE_URL: ${DATABASE_URL_INTERNAL:-postgres://learning_english:learning_english_dev@postgres:5432/learning_english?sslmode=disable}
      JWT_ISSUER: ${JWT_ISSUER:-learning-english}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-learning-english-web}
      JWT_HS256_SECRET: ${JWT_HS256_SECRET:-learning-english_dev_secret}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-15m}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL:-720h}
      REFRESH_COOKIE_NAME: ${REFRESH_COOKIE_NAME:-le_refresh}
      REFRESH_COOKIE_DOMAIN: ${REFRESH_COOKIE_DOMAIN:-}
      REFRESH_COOKIE_SECURE: ${REFRESH_COOKIE_SECURE:-false}
      REFRESH_COOKIE_SAME_SITE: ${REFRESH_COOKIE_SAME_SITE:-lax}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-learning-english-local}
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-}
      STORAGE_PUBLIC_BASE_URL: ${STORAGE_PUBLIC_BASE_URL:-}
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./backend:/app
      - backend_go_mod_cache:/go/pkg/mod
      - backend_go_build_cache:/root/.cache/go-build

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_started
    working_dir: /app
    command:
      [
        "npm",
        "run",
        "dev",
        "--",
        "--host",
        "0.0.0.0",
        "--port",
        "5173",
      ]
    environment:
      VITE_APP_ENV: ${VITE_APP_ENV:-development}
      VITE_APP_NAME: ${VITE_APP_NAME:-learning-english}
      VITE_APP_ORIGIN: ${VITE_APP_ORIGIN:-http://localhost:5173}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api/v1}
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  backend_go_mod_cache:
  backend_go_build_cache:
  frontend_node_modules:
