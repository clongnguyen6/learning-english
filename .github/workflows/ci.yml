name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-hygiene:
    name: Repo Hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Compose file
        run: make compose-config

      - name: Check patch formatting
        run: git diff --check

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend shell
        run: npm run build

  backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.1"

      - name: Run backend tests
        run: go test ./...

      - name: Run backend vet
        run: go vet ./...

  migrations:
    name: Migration Sanity
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Compose file
        run: make compose-config

      - name: Apply all migrations
        run: make migrate-up

      - name: Show migration version
        run: make migrate-version

      - name: Roll back one migration step
        run: make migrate-down STEPS=1

      - name: Re-apply pending migrations
        run: make migrate-up

      - name: Stop Compose services
        if: always()
        run: make db-down
